name: nas_projekt-master

services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: nti_app
    restart: unless-stopped
    working_dir: /app/backend
    volumes:
      - ./:/app/backend
      - ../frontend:/app/frontend
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - nti_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.25-alpine
    container_name: nti_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/app/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - nti_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: nti_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nti_db
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_USER: nti_user
      MYSQL_PASSWORD: nti_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nti_network

  redis:
    image: redis:7-alpine
    container_name: nti_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - nti_network

networks:
  nti_network:
    driver: bridge

volumes:
  mysql_data:
